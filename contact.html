<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/avif" href="/images/red.avif">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altf4.in</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        a {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            padding-top: 170px;
        }

        .top-header {
            height: 120px;
            background: #0b0b0b;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        /* LEFT NAV */

        .nav-left a {
            color: #d6d6d6;
            text-decoration: none;
            margin-right: 40px;
            font-family: sans-serif;
            font-size: 16px;
        }

        .nav-left a:hover {
            color: white;
        }

        /* active page */

        .nav-left .active {
            color: white;
            border-bottom: 2px solid white;
            padding-bottom: 4px;
        }

        /* LOGO */

        .nav-logo img {
            width: 110px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* RIGHT ICONS */

        .nav-right {
            display: flex;
            gap: 30px;
            font-size: 22px;
            color: white;
            cursor: pointer;
        }

        .nav-right i:hover {
            color: #cfcfcf;
        }

        .nav-right a {
            color: white;
            text-decoration: none;
        }

        .nav-right a:visited {
            color: white;
        }

        .nav-right a:hover {
            color: #cfcfcf;
        }



        .Delivery-bar {
            background: lightgray;
            height: 50px;
            width: 100%;
            position: fixed;
            top: 120px;
            left: 0;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .head {
            color: black;
            font-size: 20px;

        }

        /* HERO */

        .hero {
            margin-top: 0;
            padding-top: 0;
            position: relative;
            display: flex;
            width: 100%;
            height: 100vh;
        }

        .left-img {
            width: 50%;
            height: 100%;
            background-image: url(images/2.jpg);
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .right-img {
            width: 50%;
            height: 100%;
            background-image: url(images/3.jpg);
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .left-img::after,
        .right-img::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
        }

        .hero-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        .shop-button {
            padding: 14px 40px;
            border: 2px solid white;
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-family: sans-serif;
            transition: 0.3s;
        }

        .shop-button:hover {
            background: white;
            color: black;
        }

        /* PRODUCTS */

        .products {
            background: #efefef;
            padding: 60px 80px;
        }

        .products h2 {
            font-size: 32px;
            margin-bottom: 40px;
            font-family: sans-serif;
        }

        .product-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .product a {
            text-decoration: none;
            color: black;
            font-family: sans-serif;
            display: block;
            margin-top: 15px;
            text-align: center;
        }

        .product :hover {
            text-decoration: underline;
        }

        .product-img {
            width: 100%;
            height: 420px;
            object-fit: cover;
            position: relative;
            overflow: hidden;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .img2 {
            opacity: 0;
        }

        .product-img:hover .img2 {
            opacity: 1;
        }

        .product-img:hover .img1 {
            opacity: 0;
        }

        .p_name {
            margin-top: 15px;
            font-size: 16px;
        }

        .price {
            margin-top: 8px;
            font-size: 15px;
            text-align: center;
        }

        .footer {
            background: #0b0b0b;
            color: white;
            text-align: center;
            padding: 80px 20px 30px;
            font-family: sans-serif;
        }

        .footer-title {
            font-size: 28px;
            margin-bottom: 25px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .footer-links a {
            color: #cfcfcf;
            text-decoration: none;
            font-size: 14px;
        }

        .footer-links a:hover {
            color: white;
            text-decoration: underline;
        }

        .footer-instagram {
            font-size: 24px;
            margin-bottom: 50px;
        }

        .footer-instagram a {
            color: white;
        }

        .footer-bottom {
            border-top: 1px solid #222;
            padding-top: 20px;
            font-size: 13px;
            color: #aaa;
        }

        .footer-bottom a {
            color: #aaa;
            text-decoration: none;
        }

        .footer-bottom a:hover {
            color: white;
            border-bottom: 2px solid white;
        }

        .about-section {
            background: white;
            padding: 100px 0;
            font-family: sans-serif;
        }

        .about-title {
            text-align: center;
            font-size: 60px;
            font-weight: 300;
            margin-bottom: 60px;
        }

        .about-info {
            width: 55%;
            margin: 0 auto 60px auto;
            color: #444;
            line-height: 30px;
            font-size: 18px;
        }

        .contact-form {
            width: 55%;
            margin: auto;
        }

        /* row for name + email */

        .row {
            display: flex;
            gap: 30px;
        }

        /* equal width */

        .row .input-box {
            width: 50%;
        }

        /* floating input */

        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        .input-box input:focus,
        .input-box textarea:focus {
            background: transparent;
            border: 1px solid black;
            box-shadow: 0 0 0 1px black;
        }

        .input-box input,
        .input-box textarea {
            width: 100%;
            padding: 18px 12px;
            border: 1px solid #999;
            background: transparent;
            font-size: 16px;
            outline: none;
        }

        /* label */

        .input-box label {
            position: absolute;
            left: 12px;
            top: 18px;
            color: #666;
            font-size: 16px;
            pointer-events: none;
            transition: 0.25s;
            background: #e6e6e6;
            padding: 0 5px;
        }

        /* label animation */

        .input-box input:focus+label,
        .input-box input:valid+label,
        .input-box textarea:focus+label,
        .input-box textarea:valid+label {
            top: -10px;
            font-size: 13px;
            color: black;
        }

        /* textarea */

        .input-box textarea {
            height: 150px;
            resize: none;
        }

        /* SEARCH OVERLAY */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 1000;
        }

        .overlay:target {
            opacity: 1;
            visibility: visible;
        }

        .overlay-close {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            cursor: pointer;
        }

        .search-box {
            position: relative;
            width: 70%;
            max-width: 900px;
            margin: 80px auto;
            border: 2px solid white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 18px;
        }

        .close-icon {
            color: white;
            font-size: 24px;
            text-decoration: none;
            margin-left: 20px;
        }

        /* FLOATING INPUT */

        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        .input-box input,
        .input-box textarea {
            width: 100%;
            padding: 20px 12px;
            border: 1px solid #999;
            background: transparent;
            font-size: 16px;
            outline: none;
        }

        /* label */

        .input-box label {
            position: absolute;
            left: 12px;
            top: 20px;
            color: #666;
            font-size: 16px;
            pointer-events: none;
            transition: 0.25s;
            background: white;
            padding: 0 5px;
        }

        /* move label up */

        .input-box input:focus+label,
        .input-box input:valid+label,
        .input-box textarea:focus+label,
        .input-box textarea:valid+label {
            top: -10px;
            font-size: 13px;
            color: black;
            background: #efefef;
        }

        /* textarea */

        .input-box textarea {
            height: 150px;
            resize: none;
        }

        .contact-form button {
            background: black;
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
            transition: .3s;
        }

        .contact-form button:hover {
            background: #222;
        }

        /* ======================================================
MOBILE MENU BUTTON
Hidden on desktop
====================================================== */

        .mobile-menu-btn {

            display: none;

            font-size: 22px;
            color: white;

            text-decoration: none;

        }


        /* MOBILE MENU OVERLAY */

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #0b0b0b;
            z-index: 2000;
            display: none;
        }

        #mobileMenu:target {
            display: block;
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 100px;
            text-align: left;
        }

        .menu-links a {
            color: white;
            text-decoration: none;
            font-size: 22px;
        }

        @media (max-width:768px) {

            /* BODY */

            body {
                padding-top: 120px;

            }

        

            /* SHOW MOBILE MENU BUTTON */

            .mobile-menu-btn {
                display: block;
            }
            .nav-right .user-icon {
                display: none;
            }

            .nav-right a {
                color: white;
                text-decoration: none;



                display: flex;


                -webkit-tap-highlight-color: transparent;
            }
            /* HEADER */

            .top-header {
                height: 80px;
                padding: 0 20px;
            }

            /* hide left menu */

            .nav-left {
                display: none;
            }

            /* logo center */

            .nav-logo img {
                width: 85px;
                top: 50%;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
            }

            /* icons */

            .nav-right {
                gap: 18px;
                font-size: 20px;
            }

            /* DELIVERY BAR */

            .Delivery-bar {
                background-color: lightgray;
                height: 50px;
                top: 80px;
                width: 100%;
                left: 0;
                z-index: 999;
                position: fixed;
            }

            .head {
                font-size: 16px;
                padding: 10px;
                font-weight: 500;
            }

            /* HERO SECTION */

            .hero {
                flex-direction: column;
                height: auto;
            }

            .left-img,
            .right-img {
                width: 100%;
                height: 50vh;
            }

            /* SHOP BUTTON */

            .shop-button {
                font-size: 16px;
                padding: 12px 30px;
            }

            /* PRODUCTS */

            .products {
                padding: 40px 20px;
            }

            .product-container {
                grid-template-columns: 1fr;
                gap: 25px;
            }

            .product-img {
                height: 350px;
            }

            /* ABOUT SECTION */

            .about-section {
                padding: 60px 20px;
                background: white;
            }

            .about-title {
                font-size: 40px;
            }

            .about-info {
                width: 100%;
                font-size: 16px;
                line-height: 26px;
            }

            /* CONTACT FORM */

            .contact-form {
                width: 100%;
            }

            .row {
                flex-direction: column;
                gap: 0;
            }

            .row .input-box {
                width: 100%;
            }

            /* SEARCH BOX */

            .search-box {
                width: 90%;
                margin: 120px auto;
            }

            /* FOOTER */

            .footer {
                padding: 60px 20px 20px;
            }

            .footer-links {
                flex-direction: column;
                gap: 15px;
            }

            .footer-instagram {
                margin-bottom: 30px;
            }

            .footer-bottom {
                font-size: 12px;
                line-height: 22px;
            }

        }

        /* ======================================================
SEARCH OVERLAY
Fullscreen search popup
====================================================== */

        .search-box input {

        /* search button inside */

        .search-btn {
            position: absolute;

            transform: translateY(-50%);

        }

        .search-btn i {
            color: white;
        }

        .search-box input {
            width: 100%;
            height: 45px;
            padding: 0 45px 0 15px;
            border: none;
            outline: none;
            font-size: 16px;
            border-radius: 4px;
        }

        /* cancel button */


        .search-cancel {
            color: white;
            font-size: 22px;
        }

        /* SHOW SEARCH */

        .overlay:target {

            opacity: 1;
            visibility: visible;

        }


        /* CLICK AREA TO CLOSE SEARCH */

        .search-box input {

        .overlay-close {

        .close-icon {

            color: white;

            text-decoration: none;

            margin-left: 20px;

        }
    </style>
